services:
  arris_cable_modem_stats:
    build: .
    image: arris_stats_local
    restart: unless-stopped
    volumes:
      # Mount src/ so code changes take effect without rebuilding
      - ./src:/app/src
    environment:
      log_level: info
      destination: homeassistant
      sleep_interval: 300

      modem_url: https://192.168.100.1/cmconnectionstatus.html
      modem_ip: 192.168.100.1
      modem_verify_ssl: "False"
      modem_auth_required: "False"
      modem_username: admin
      modem_password: ""
      modem_model: sb8200          # sb6183 | sb8200 | t25 | s33
      request_timeout: 10

      exit_on_auth_error: "True"
      exit_on_html_error: "True"
      clear_auth_token_on_html_error: "True"
      sleep_before_exit: "True"

      # InfluxDB 1.x
      influx_major_version: 1
      influx_verify_ssl: "False"
      influx_host: localhost
      influx_port: 8086
      influx_database: cable_modem_stats
      influx_username: ""
      influx_password: ""
      influx_use_ssl: "False"

      # InfluxDB 2.x (uncomment and fill in if using v2)
      # influx_major_version: 2
      # influx_org: ""
      # influx_url: http://localhost:8086
      # influx_bucket: cable_modem_stats
      # influx_token: ""

      # AWS Timestream (uncomment if using)
      # destination: timestream
      # timestream_aws_access_key_id: ""
      # timestream_aws_secret_access_key: ""
      # timestream_database: cable_modem_stats
      # timestream_table: cable_modem_stats
      # timestream_aws_region: us-east-1

      # Splunk (uncomment if using)
      # destination: splunk
      # splunk_host: ""
      # splunk_port: 8088
      # splunk_token: ""
      # splunk_ssl: "False"
      # splunk_verify_ssl: "True"
      # splunk_source: arris_cable_modem_stats
